<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公共管理学院 · 概念模型 E-R 图</title>
<style>
  :root {
    --bg: #FDF9F3;
    --card-bg: #FFFFFF;
    --text: #3D3226;
    --muted: #8B7D6B;
    --line: #B8A090;
    --line-light: #DDD2C4;
    --dept:    #E8A87C; --dept-bg:    #FFF7F1;
    --teacher: #A3B18A; --teacher-bg: #F6F9F2;
    --student: #A8C4D8; --student-bg: #F3F7FB;
    --course:  #C4B0C8; --course-bg:  #F8F3FA;
    --shadow: 0 4px 28px rgba(60,40,20,.06), 0 1px 4px rgba(60,40,20,.04);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    font-family: "PingFang SC","Microsoft YaHei","Hiragino Sans GB",system-ui,sans-serif;
    color: var(--text);
    font-size: 20px;
    min-height: 100vh;
  }

  /* 背景 */
  .bg-ambient {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bg-ambient .orb {
    position: absolute; border-radius: 50%; filter: blur(130px); opacity: .18;
  }
  .bg-ambient .orb-1 { width: 540px; height: 540px; background: #F0D8B8; top: -180px; right: -120px; }
  .bg-ambient .orb-2 { width: 380px; height: 380px; background: #C8D8C0; bottom: -140px; left: -100px; }
  .bg-ambient .orb-3 { width: 200px; height: 200px; background: #D0C8E0; top: 50%; left: 60%; }

  .page {
    position: relative; z-index: 1;
    max-width: 1500px; margin: 0 auto; padding: 56px 56px 80px;
  }

  /* 标题 */
  .hero { text-align: center; margin-bottom: 50px; }
  .hero .badge {
    display: inline-block; font-size: 20px; font-weight: 500; letter-spacing: .14em;
    color: var(--muted); padding: 8px 26px;
    border: 1.5px solid var(--line-light); border-radius: 28px;
    margin-bottom: 18px;
  }
  .hero h1 { font-size: 36px; font-weight: 700; letter-spacing: .06em; color: var(--text); margin-bottom: 6px; }
  .hero .sub { font-size: 22px; color: var(--muted); font-weight: 400; }

  /* 分割线 */
  .sep { width: 90px; height: 2px; background: var(--line-light); margin: 0 auto 54px; border-radius: 1px; }

  /* 画布区 */
  .canvas {
    background: var(--card-bg); border-radius: 20px; box-shadow: var(--shadow);
    padding: 48px 20px 40px; margin-bottom: 50px; overflow-x: auto;
  }
  .canvas svg { display: block; width: 100%; height: auto; min-width: 1050px; }

  /* 图例 */
  .legend {
    display: flex; justify-content: center; flex-wrap: wrap; gap: 40px;
    margin-bottom: 52px; font-size: 21px; color: #6B5F52;
  }
  .lg { display: flex; align-items: center; gap: 12px; }
  .lg-rect  { width: 28px; height: 20px; border-radius: 5px; border: 2px solid var(--line-light); background:#fff; }
  .lg-dia   { width: 22px; height: 22px; transform:rotate(45deg); border-radius:4px; border:2px solid #D4C0A0; background:#F9F3E7; }
  .lg-line  { width: 34px; height: 0; border-top: 4px solid var(--line); }
  .lg-pk    { font-weight: 700; color: var(--text); }

  /* 属性卡片 */
  .cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(320px,1fr)); gap: 22px;
  }
  .card {
    background: var(--card-bg); border-radius: 14px; padding: 24px 26px;
    box-shadow: var(--shadow); border-left: 5px solid transparent;
  }
  .card.dept    { border-left-color: var(--dept); }
  .card.teacher { border-left-color: var(--teacher); }
  .card.student { border-left-color: var(--student); }
  .card.course  { border-left-color: var(--course); }
  .card h3 { font-size: 23px; font-weight: 700; margin-bottom: 14px; color: var(--text); }
  .card ul  { list-style: none; padding: 0; }
  .card li  { font-size: 20px; color: #6B5F52; line-height: 2.3; }
  .card li.pk { font-weight: 700; color: var(--text); }

  @media (max-width:768px) {
    .page { padding: 28px 16px 40px; }
    .hero h1 { font-size: 28px; }
    .canvas { padding: 20px 6px 14px; border-radius: 14px; }
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="bg-ambient">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="page">

  <div class="hero">
    <div class="badge">Entity-Relationship Diagram</div>
    <h1>公共管理学院 · 概念模型</h1>
    <p class="sub">某公共管理学院教务系统 E-R 概念模型设计</p>
  </div>
  <div class="sep"></div>

  <div class="canvas">

    <svg viewBox="0 0 1480 960" xmlns="http://www.w3.org/2000/svg">

      <defs>
        <filter id="sh" x="-6%" y="-4%" width="112%" height="112%">
          <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#4A3020" flood-opacity="0.07"/>
        </filter>
        <filter id="sh-heavy" x="-6%" y="-4%" width="112%" height="112%">
          <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#4A3020" flood-opacity="0.10"/>
        </filter>
      </defs>

      <!--
        ═══════════════════════════════════════
        布局规划
        ═══════════════════════════════════════
        画布 1480×960
        实体 360×?  标题栏 52px  属性行 44px  内边距 28px

        系：x=560 y=40  h=52+5×44+20=292 → 295
        教师：x=50  y=460 h=52+3×44+20=204 → 205
        课程：x=560 y=460 h=52+3×44+20=204 → 205
        学生：x=1070 y=440 h=52+4×44+20=248 → 250

        中排中线 教师y=460+102=562  课程y=460+102=562  学生y=440+125=565
        调学生y=437 中线=437+125=562 ✓
      -->

      <!-- ──────────── 连线 ──────────── -->

      <!-- 连线 1：系 → 教师  隶属 1:N -->
      <path d="M 740 335 L 740 405 L 230 405 L 230 460"
            fill="none" stroke="#B8A090" stroke-width="4.5"
            stroke-linecap="round" stroke-linejoin="round"/>

      <!-- 连线 2：教师 → 课程  授课 M:N -->
      <line x1="410" y1="562" x2="560" y2="562"
            stroke="#B8A090" stroke-width="4.5" stroke-linecap="round"/>

      <!-- 连线 3：课程 → 学生  选课 M:N -->
      <line x1="920" y1="562" x2="1070" y2="562"
            stroke="#B8A090" stroke-width="4.5" stroke-linecap="round"/>

      <!-- ──────────── 联系菱形 ──────────── -->

      <!-- 授课 菱形 -->
      <polygon points="485,530 515,562 485,594 455,562"
               fill="#FCF6EC" stroke="#D4C0A0" stroke-width="2.5" stroke-linejoin="round"/>
      <text x="485" y="569" text-anchor="middle" font-size="21" fill="#5C4A32" font-weight="700">授课</text>
      <text x="485" y="626" text-anchor="middle" font-size="20" fill="#A09080">评估结果</text>

      <!-- 选课 菱形 -->
      <polygon points="995,530 1025,562 995,594 965,562"
               fill="#FCF6EC" stroke="#D4C0A0" stroke-width="2.5" stroke-linejoin="round"/>
      <text x="995" y="569" text-anchor="middle" font-size="21" fill="#5C4A32" font-weight="700">选课</text>
      <text x="995" y="626" text-anchor="middle" font-size="20" fill="#A09080">成绩</text>

      <!-- ──────────── 关系标签 ──────────── -->

      <!-- 隶属 pill -->
      <rect x="450" y="394" width="80" height="34" rx="17"
            fill="#FDF8F1" stroke="#D4C8B8" stroke-width="1.8"/>
      <text x="490" y="417" text-anchor="middle" font-size="21" fill="#7A6B58" font-weight="600">隶属</text>

      <!-- ──────────── 基数 ──────────── -->

      <!-- 隶属 1 / N -->
      <circle cx="740" cy="362" r="18" fill="#FDF8F1" stroke="#B8A090" stroke-width="2.8"/>
      <text x="740" y="370" text-anchor="middle" font-size="21" fill="#5C4A32" font-weight="800">1</text>

      <circle cx="230" cy="438" r="18" fill="#FDF8F1" stroke="#B8A090" stroke-width="2.8"/>
      <text x="230" y="446" text-anchor="middle" font-size="21" fill="#5C4A32" font-weight="800">N</text>

      <!-- 授课 M / N -->
      <circle cx="444" cy="562" r="18" fill="#FDF8F1" stroke="#B8A090" stroke-width="2.8"/>
      <text x="444" y="570" text-anchor="middle" font-size="21" fill="#5C4A32" font-weight="800">M</text>

      <circle cx="530" cy="562" r="18" fill="#FDF8F1" stroke="#B8A090" stroke-width="2.8"/>
      <text x="530" y="570" text-anchor="middle" font-size="21" fill="#5C4A32" font-weight="800">N</text>

      <!-- 选课 M / N -->
      <circle cx="954" cy="562" r="18" fill="#FDF8F1" stroke="#B8A090" stroke-width="2.8"/>
      <text x="954" y="570" text-anchor="middle" font-size="21" fill="#5C4A32" font-weight="800">M</text>

      <circle cx="1040" cy="562" r="18" fill="#FDF8F1" stroke="#B8A090" stroke-width="2.8"/>
      <text x="1040" y="570" text-anchor="middle" font-size="21" fill="#5C4A32" font-weight="800">N</text>

      <!--
        ════════════════════ 实体卡片 ════════════════════
        统一尺寸 360×?
        标题栏 52px  属性行 44px  内边距 28px
        圆角 rx=16  描边 2px
      -->

      <!-- ===== 系 Department ===== -->
      <g transform="translate(560, 40)">
        <!-- 卡片底衬 -->
        <rect x="0" y="0" width="360" height="295" rx="16" fill="#000" opacity="0" filter="url(#sh)"/>
        <!-- 主体 -->
        <rect x="0" y="0" width="360" height="295" rx="16" fill="#FFFFFF" stroke="#E8DDD0" stroke-width="2"/>
        <!-- 标题栏 -->
        <path d="M 16 0 L 344 0 Q 360 0 360 16 L 360 52 L 0 52 L 0 16 Q 0 0 16 0 Z" fill="#E8A87C"/>
        <text x="180" y="36" text-anchor="middle" font-size="25" fill="#FFFFFF" font-weight="700">系 Department</text>

        <text x="28" y="86" font-size="21" fill="#3D3226" font-weight="700">系代号</text>
        <text x="102" y="86" font-size="20" fill="#E8A87C">(PK)</text>
        <line x1="28" y1="98" x2="332" y2="98" stroke="#F2EAE0" stroke-width="1.2"/>

        <text x="28" y="132" font-size="21" fill="#3D3226">系名称</text>
        <line x1="28" y1="144" x2="332" y2="144" stroke="#F2EAE0" stroke-width="1.2"/>

        <text x="28" y="178" font-size="21" fill="#3D3226">系主任姓名</text>
        <line x1="28" y1="190" x2="332" y2="190" stroke="#F2EAE0" stroke-width="1.2"/>

        <text x="28" y="224" font-size="21" fill="#3D3226">办公地点</text>
        <line x1="28" y1="236" x2="332" y2="236" stroke="#F2EAE0" stroke-width="1.2"/>

        <text x="28" y="270" font-size="21" fill="#3D3226">电话</text>
      </g>

      <!-- 系实例 -->
      <g transform="translate(560, 352)">
        <text x="180" y="0" text-anchor="middle" font-size="20" fill="#B5A590">
          行政管理系 · 城市管理系 · 土地管理系 · 电子政务系
        </text>
      </g>

      <!-- ===== 教师 Teacher ===== -->
      <g transform="translate(50, 460)">
        <rect x="0" y="0" width="360" height="205" rx="16" fill="#000" opacity="0" filter="url(#sh)"/>
        <rect x="0" y="0" width="360" height="205" rx="16" fill="#FFFFFF" stroke="#E8DDD0" stroke-width="2"/>
        <path d="M 16 0 L 344 0 Q 360 0 360 16 L 360 52 L 0 52 L 0 16 Q 0 0 16 0 Z" fill="#A3B18A"/>
        <text x="180" y="36" text-anchor="middle" font-size="25" fill="#FFFFFF" font-weight="700">教师 Teacher</text>

        <text x="28" y="86" font-size="21" fill="#3D3226" font-weight="700">教师编号</text>
        <text x="124" y="86" font-size="20" fill="#A3B18A">(PK)</text>
        <line x1="28" y1="98" x2="332" y2="98" stroke="#F2EAE0" stroke-width="1.2"/>

        <text x="28" y="132" font-size="21" fill="#3D3226">教师姓名</text>
        <line x1="28" y1="144" x2="332" y2="144" stroke="#F2EAE0" stroke-width="1.2"/>

        <text x="28" y="178" font-size="21" fill="#3D3226">专业特长</text>
      </g>

      <!-- ===== 课程 Course ===== -->
      <g transform="translate(560, 460)">
        <rect x="0" y="0" width="360" height="205" rx="16" fill="#000" opacity="0" filter="url(#sh)"/>
        <rect x="0" y="0" width="360" height="205" rx="16" fill="#FFFFFF" stroke="#E8DDD0" stroke-width="2"/>
        <path d="M 16 0 L 344 0 Q 360 0 360 16 L 360 52 L 0 52 L 0 16 Q 0 0 16 0 Z" fill="#C4B0C8"/>
        <text x="180" y="36" text-anchor="middle" font-size="25" fill="#FFFFFF" font-weight="700">课程 Course</text>

        <text x="28" y="86" font-size="21" fill="#3D3226" font-weight="700">课程号</text>
        <text x="102" y="86" font-size="20" fill="#C4B0C8">(PK)</text>
        <line x1="28" y1="98" x2="332" y2="98" stroke="#F2EAE0" stroke-width="1.2"/>

        <text x="28" y="132" font-size="21" fill="#3D3226">课程名</text>
        <line x1="28" y1="144" x2="332" y2="144" stroke="#F2EAE0" stroke-width="1.2"/>

        <text x="28" y="178" font-size="21" fill="#3D3226">学分</text>
      </g>

      <!-- ===== 学生 Student ===== -->
      <g transform="translate(1070, 437)">
        <rect x="0" y="0" width="360" height="250" rx="16" fill="#000" opacity="0" filter="url(#sh)"/>
        <rect x="0" y="0" width="360" height="250" rx="16" fill="#FFFFFF" stroke="#E8DDD0" stroke-width="2"/>
        <path d="M 16 0 L 344 0 Q 360 0 360 16 L 360 52 L 0 52 L 0 16 Q 0 0 16 0 Z" fill="#A8C4D8"/>
        <text x="180" y="36" text-anchor="middle" font-size="25" fill="#FFFFFF" font-weight="700">学生 Student</text>

        <text x="28" y="86" font-size="21" fill="#3D3226" font-weight="700">学号</text>
        <text x="82" y="86" font-size="20" fill="#A8C4D8">(PK)</text>
        <line x1="28" y1="98" x2="332" y2="98" stroke="#F2EAE0" stroke-width="1.2"/>

        <text x="28" y="132" font-size="21" fill="#3D3226">姓名</text>
        <line x1="28" y1="144" x2="332" y2="144" stroke="#F2EAE0" stroke-width="1.2"/>

        <text x="28" y="178" font-size="21" fill="#3D3226">性别</text>
        <line x1="28" y1="190" x2="332" y2="190" stroke="#F2EAE0" stroke-width="1.2"/>

        <text x="28" y="224" font-size="21" fill="#3D3226">年龄</text>
      </g>

    </svg>

  </div>

  <!-- 图例 -->
  <div class="legend">
    <div class="lg"><div class="lg-rect"></div> 实体</div>
    <div class="lg"><div class="lg-dia"></div> 联系</div>
    <div class="lg"><span class="lg-pk">粗体</span> 主键 (PK)</div>
    <div class="lg"><div class="lg-line"></div> 关系 + 基数</div>
  </div>

  <!-- 属性详情卡片 -->
  <div class="cards">
    <div class="card dept">
      <h3>系 Department</h3>
      <ul>
        <li class="pk">系代号 (PK)</li>
        <li>系名称</li>
        <li>系主任姓名</li>
        <li>办公地点</li>
        <li>电话</li>
      </ul>
    </div>
    <div class="card teacher">
      <h3>教师 Teacher</h3>
      <ul>
        <li class="pk">教师编号 (PK)</li>
        <li>教师姓名</li>
        <li>专业特长</li>
      </ul>
    </div>
    <div class="card student">
      <h3>学生 Student</h3>
      <ul>
        <li class="pk">学号 (PK)</li>
        <li>姓名</li>
        <li>性别</li>
        <li>年龄</li>
      </ul>
    </div>
    <div class="card course">
      <h3>课程 Course</h3>
      <ul>
        <li class="pk">课程号 (PK)</li>
        <li>课程名</li>
        <li>学分</li>
      </ul>
    </div>
  </div>

</div>

</body>
</html>
