<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公共管理学院 · 概念模型 E-R 图</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FBF7F0;
            --card-bg: #FFFFFF;
            --entity-fill: #FFFBF5;
            --entity-stroke: #B8977E;
            --entity-text: #3D2E1F;
            --relation-fill: #F4F9F4;
            --relation-stroke: #7D9D7D;
            --relation-text: #3A4F3A;
            --attr-fill: #FFFEFA;
            --attr-stroke: #D0C4B4;
            --attr-text: #5C4F3F;
            --line-color: #B8A088;
            --accent: #8B6914;
            --accent-light: #E8DCC8;
            --text-primary: #3D2E1F;
            --text-secondary: #6B5D4F;
            --text-muted: #9B8E80;
            --shadow-sm: 0 1px 3px rgba(61, 46, 31, 0.06), 0 1px 2px rgba(61, 46, 31, 0.04);
            --shadow-md: 0 4px 16px rgba(61, 46, 31, 0.08), 0 2px 6px rgba(61, 46, 31, 0.04);
            --shadow-lg: 0 8px 32px rgba(61, 46, 31, 0.10), 0 4px 12px rgba(61, 46, 31, 0.05);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', 'STSong', 'Songti SC', 'SimSun', 'NSimSun', serif;
            background: linear-gradient(165deg, #FBF7F0 0%, #F5EFE4 30%, #FAF6EE 60%, #FDF9F3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Subtle noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1180px;
        }

        /* Card wrapper */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid rgba(184, 151, 126, 0.15);
        }

        /* Header */
        .card-header {
            padding: 36px 48px 24px;
            text-align: center;
            border-bottom: 1px solid var(--accent-light);
            position: relative;
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 2px;
        }

        .card-header .badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            background: rgba(139, 105, 20, 0.08);
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        .card-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.03em;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .card-header .subtitle {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
        }

        /* SVG area */
        .svg-wrapper {
            padding: 20px 28px 28px;
            display: flex;
            justify-content: center;
            overflow-x: auto;
        }

        .svg-wrapper svg {
            max-width: 100%;
            height: auto;
        }

        /* SVG internal styles */
        .entity-rect {
            fill: var(--entity-fill);
            stroke: var(--entity-stroke);
            stroke-width: 2;
            rx: 6;
            ry: 6;
            transition: fill 0.25s ease;
            cursor: default;
        }

        .entity-rect:hover {
            fill: #FFF8EC;
        }

        .relation-rhombus {
            fill: var(--relation-fill);
            stroke: var(--relation-stroke);
            stroke-width: 1.8;
            transition: fill 0.25s ease;
            cursor: default;
        }

        .relation-rhombus:hover {
            fill: #E8F2E8;
        }

        .attr-ellipse {
            fill: var(--attr-fill);
            stroke: var(--attr-stroke);
            stroke-width: 1.4;
            transition: fill 0.25s ease;
            cursor: default;
        }

        .attr-ellipse:hover {
            fill: #FFFDF4;
        }

        .connector-line {
            stroke: var(--line-color);
            stroke-width: 1.6;
            fill: none;
            stroke-linecap: round;
        }

        .connector-line-attr {
            stroke: var(--attr-stroke);
            stroke-width: 1.2;
            fill: none;
            stroke-linecap: round;
        }

        .entity-label {
            font-family: 'Noto Serif SC', serif;
            fill: var(--entity-text);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .relation-label {
            font-family: 'Noto Serif SC', serif;
            fill: var(--relation-text);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.06em;
        }

        .attr-label {
            font-family: 'Noto Serif SC', serif;
            fill: var(--attr-text);
            font-size: 13px;
            font-weight: 400;
        }

        .attr-label-pk {
            font-family: 'Noto Serif SC', serif;
            fill: var(--attr-text);
            font-size: 13px;
            font-weight: 600;
            text-decoration: underline;
            text-decoration-color: #B8977E;
            text-underline-offset: 3px;
        }

        .pk-underline {
            stroke: var(--entity-stroke);
            stroke-width: 1.6;
            stroke-linecap: round;
        }

        .cardinality-label {
            font-family: 'Noto Serif SC', serif;
            fill: #8B7355;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.04em;
        }

        .annotation-text {
            font-family: 'Noto Serif SC', serif;
            fill: var(--text-muted);
            font-size: 11px;
            font-style: italic;
        }

        /* Legend area */
        .legend-section {
            padding: 18px 48px 32px;
            display: flex;
            justify-content: center;
            gap: 36px;
            flex-wrap: wrap;
            border-top: 1px solid rgba(184, 151, 126, 0.08);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .legend-swatch {
            width: 20px;
            height: 14px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .legend-swatch.entity {
            background: var(--entity-fill);
            border: 1.8px solid var(--entity-stroke);
            border-radius: 4px;
        }

        .legend-swatch.relation {
            width: 16px;
            height: 16px;
            background: var(--relation-fill);
            border: 1.6px solid var(--relation-stroke);
            transform: rotate(45deg);
            border-radius: 2px;
        }

        .legend-swatch.attr {
            width: 20px;
            height: 12px;
            background: var(--attr-fill);
            border: 1.4px solid var(--attr-stroke);
            border-radius: 50%;
        }

        .legend-swatch.pk {
            background: transparent;
            border: none;
            position: relative;
            display: flex;
            align-items: flex-end;
        }

        .legend-swatch.pk::after {
            content: '';
            width: 20px;
            height: 2px;
            background: var(--entity-stroke);
            border-radius: 1px;
        }

        /* Footer info */
        .card-footer {
            padding: 16px 48px 24px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 16px 8px;
            }
            .card-header {
                padding: 28px 20px 20px;
            }
            .card-header h1 {
                font-size: 22px;
            }
            .svg-wrapper {
                padding: 12px 8px 16px;
            }
            .legend-section {
                padding: 14px 20px 24px;
                gap: 20px;
            }
        }

        /* Print styles */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .card {
                box-shadow: none;
                border: none;
            }
            .svg-wrapper svg {
                max-width: 100%;
                page-break-inside: avoid;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .entity-rect,
            .relation-rhombus,
            .attr-ellipse {
                transition: none;
            }
        }
    </style>
</head>
<body>

<div class="main-container">

            <p class="subtitle">Chen 表示法 · 实体联系模型</p>

        <!-- SVG Diagram -->
        <div class="svg-wrapper">

</svg>
        </div>

        <!-- Legend -->

            <div class="legend-item">
                <div class="legend-swatch entity"></div>
                <span>实体（矩形）</span>

            <div class="legend-item">

            <div class="legend-item">

        </div>

    </div>
</div>

</body>
